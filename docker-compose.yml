services:
  # 1. Database
  exam_db:
    image: postgres:16-alpine
    container_name: exam_db
    restart: always
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: YourStrongPassword123!
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Backend API
  exam_api:
    image: sat-mock-api
    container_name: exam_api
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=exam_db;Database=postgres;Username=postgres;Password=YourStrongPassword123!
    depends_on:
      exam_db:
        condition: service_healthy
    networks:
      - app_network

  # 3. Reverse Proxy
  exam_proxy:
    image: caddy:latest
    container_name: exam_proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - exam_api
    networks:
      - app_network

networks:
  app_network:
    name: sat-mock_network # This forces the network name to be exactly this
    driver: bridge

volumes:
  postgres_data:
  caddy_data:
  caddy_config: