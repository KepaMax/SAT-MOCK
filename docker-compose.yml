services:
  # 1. Database
  exam_db:
    image: postgres:16-alpine
    container_name: exam_db
    restart: always
    # Exposed so the VPS host can run 'dotnet ef database update'
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Backend API
  exam_api:
    image: sat-mock-api
    container_name: exam_api
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      # Use the DefaultConnection name that the Clean Architecture code expects
      - ConnectionStrings__EXAM_SYSTEMDb=${ConnectionStrings__EXAM_SYSTEMDb}
    depends_on:
      exam_db:
        condition: service_healthy
    networks:
      - app_network

  # 3. Reverse Proxy (Caddy)
  exam_proxy:
    image: caddy:latest
    container_name: exam_proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - exam_api
    networks:
      - app_network

networks:
  app_network:
    name: sat-mock_network
    driver: bridge

volumes:
  postgres_data:
  caddy_data:
  caddy_config: