services:
  # 1. Database Service
  exam_db:
    image: postgres:16-alpine
    container_name: exam_db
    restart: always
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: YourStrongPassword123!
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sat-mock_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Backend API (.NET 10)
  exam_api:
    image: ${DOCKER_IMAGE_NAME:-sat-mock-api}
    container_name: exam_api
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=exam_db;Database=postgres;Username=postgres;Password=YourStrongPassword123!
    depends_on:
      exam_db:
        condition: service_healthy
    networks:
      - sat-mock_network
    # Note: We do NOT expose ports here; Caddy handles the entry point

  # 3. Reverse Proxy (Caddy)
  exam_proxy:
    image: caddy:latest
    container_name: exam_proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # Required for HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - exam_api
    networks:
      - sat-mock_network

networks:
  sat-mock_network:
    driver: bridge

volumes:
  postgres_data:
  caddy_data:
  caddy_config: