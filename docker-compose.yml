services:
  # --- The Reverse Proxy (HTTPS & Domain) ---
  caddy:
    image: caddy:latest
    container_name: exam_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    networks:
      - exam_network

  # --- Your ASP.NET Core 10 API ---
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: exam_api
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__EXAM_SYSTEMDb=Host=db;Database=${DB_NAME:-exam_system};Username=${DB_USER:-postgres};Password=${DB_PASSWORD}
    volumes:
      # Persists login tokens/keys so you don't get 401s after a restart
      - dp_keys:/root/.aspnet/DataProtection-Keys
    # We remove public ports 8080 because Caddy handles the traffic internally
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - exam_network

  # --- The PostgreSQL Database ---
  db:
    image: postgres:16-alpine
    container_name: exam_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-exam_system}
    volumes:
      - postgres_data:/var/lib/postgresql
    # Keep 5432 open if you need to connect from your PC (e.g. pgAdmin/DBeaver)
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-exam_system}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - exam_network

networks:
  exam_network:
    driver: bridge

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  dp_keys: