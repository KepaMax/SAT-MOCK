name: CI/CD Pipeline

on:
  push:
    branches: [ main ] # Triggers on every commit to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Log in to VPS and execute deployment commands
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # 1. Navigate to project folder
            cd ~/SAT-MOCK
            
            # 2. Update code from GitHub
            git pull origin main
            
            # 3. Rebuild and restart the containers
            # This ensures the API uses the latest code/Dockerfile
            docker compose up -d --build
            
            # 4. Run .NET 10 Database Migrations
            # We use the SDK container to ensure the schema is updated
            docker run --rm \
              --network sat-mock_network \
              -v "$(pwd):/src" \
              -w /src \
              -e "ConnectionStrings__EXAM_SYSTEMDb=${{ secrets.DB_CONNECTION_STRING }}" \
              mcr.microsoft.com/dotnet/sdk:10.0-preview \
              /bin/bash -c "dotnet tool install --global dotnet-ef && \
              export PATH=\"\$PATH:/root/.dotnet/tools\" && \
              dotnet ef database update \
                --project src/Infrastructure \
                --startup-project src/Web \
                --context ApplicationDbContext"
