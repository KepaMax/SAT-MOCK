name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/SAT-MOCK
            
            # 1. Pull latest code
            git pull origin main
            
            # 2. Rebuild and restart services
            docker compose up -d --build
            
            # 3. Run Database Migrations
            # Using DOTNET_ROLL_FORWARD=LatestFeature bypasses the global.json version lock
            docker run --rm \
              --network sat-mock_network \
              -v "$(pwd):/src" \
              -w /src \
              -e "DOTNET_ROLL_FORWARD=LatestFeature" \
              -e "ConnectionStrings__EXAM_SYSTEMDb=${{ secrets.DB_CONNECTION_STRING }}" \
              mcr.microsoft.com/dotnet/sdk:10.0-preview \
              /bin/bash -c "dotnet tool install --global dotnet-ef && \
              export PATH=\"\$PATH:/root/.dotnet/tools\" && \
              dotnet ef database update \
                --project src/Infrastructure \
                --startup-project src/Web \
                --context ApplicationDbContext"
