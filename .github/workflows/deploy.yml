name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/SAT-MOCK
            
            # 1. Prevent git clean from deleting your essential files
            # (Adding these just in case they aren't in your .gitignore yet)
            echo ".env" >> .gitignore
            echo "Caddyfile" >> .gitignore
            
            # 2. Pull latest code and purge the ghost global.json
            git pull origin main
            rm -f global.json
            
            # 3. Restart services
            # We use --build to ensure code changes (like the SchoolId column) are compiled
            docker compose up -d --build
            
            # 4. Run Database Migrations
            export PATH="$PATH:$HOME/.dotnet/tools"

            # Force the connection to use localhost because we are running ON the VPS host
            dotnet ef database update \
              --project src/Infrastructure \
              --startup-project src/Web \
              --context ApplicationDbContext \
              --connection "${{ secrets.DB_CONNECTION_STRING }}"